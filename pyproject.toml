[project]
name = "rl-mimicgen"
version = "0.1.0"
description = "RL + Mimicgen (Blackwell Env)"
requires-python = ">=3.11, <3.12"
dependencies = [
  "mujoco==2.3.2",
  "torch==2.7.0",
  "torchvision==0.22.0",
  "torchaudio==2.7.0",
  "mimicgen",
  "robosuite",
  "robomimic",
  "isaaclab[all,isaacsim]==2.3.2.post1",
]

[dependency-groups]
tools = [
  "gitman",
  "just",
  "ipython",
  "pytest",
  "ruff"
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

# package this subfolder as rl_mimicgen
[tool.setuptools.packages.find]
include = ["rl_mimicgen*"]

[tool.uv]
override-dependencies = [
  "torch==2.7.1",
  "torchvision==0.22.1",
]

[[tool.uv.index]]
name = "nvidia"
url = "https://pypi.nvidia.com/"

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }
isaaclab = { index = "nvidia" }

# Local editable checkouts managed by gitman.
mimicgen = { path = "./resources/mimicgen", editable = true }
robosuite = { path = "./resources/robosuite", editable = true }
robomimic = { path = "./resources/robomimic", editable = true }
