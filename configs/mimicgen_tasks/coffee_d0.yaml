dataset_id: coffee_d0

dataset:
  path: runs/datasets/core/coffee_d0.hdf5

materialize:
  output_root: runs/official_dppo_mimicgen
  val_split: 0.0
  split_seed: 0

logging:
  root: logs/official_dppo/mimicgen

runtime:
  mujoco_gl: egl
  video_mujoco_gl: osmesa

wandb:
  entity: null

pretrain:
  config: {}

finetune:
  config:
    env:
      env_type: warp
      n_envs: 1024
      warp:
        graph_capture: true
        njmax_per_env: null
        naconmax_per_env: null
        physics_timestep: null
    train:
      # logprob_batch_size must be divisible by n_envs. Default upstream is
      # 10000, which is not a multiple of 1024. 10240 keeps memory footprint
      # comparable while staying divisible.
      logprob_batch_size: 10240

eval_bc:
  config:
    n_episodes: 20
    env:
      n_envs: 20

eval_rl_init:
  config:
    n_episodes: 20
    env:
      n_envs: 20

sweep:
  eval_mode: bc
  device: cpu
  n_envs: 20
  n_episodes: 20
  n_steps: 400
  max_episode_steps: 400
  every_n: 1
  video_checkpoints: none
  render_num: 1
  skip_existing: true
