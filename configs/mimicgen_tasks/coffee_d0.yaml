  val_split: 0.0
  split_seed: 0

logging:
  root: logs/official_dppo/mimicgen

runtime:
  mujoco_gl: glx
  video_mujoco_gl: osmesa

wandb:
  entity: null

pretrain:
  config: {}

finetune:
  config: {}

eval_bc:
